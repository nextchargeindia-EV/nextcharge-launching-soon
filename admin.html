<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Admin — NextCharge</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="q-app-icon.png">
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>

<body>
    <!-- Login Screen -->
    <div class="admin-login" id="loginScreen">
        <div class="login-card">
            <img src="nexq-logo.png" alt="NEXQ" class="login-logo">
            <h2>Blog Admin</h2>
            <p class="login-subtitle">Sign in to manage your blog posts</p>

            <form id="loginForm">
                <input type="email" class="login-field" id="loginEmail" placeholder="Email address" required
                    autocomplete="email">
                <input type="password" class="login-field" id="loginPassword" placeholder="Password" required
                    autocomplete="current-password">
                <p class="login-error" id="loginError"></p>
                <button type="submit" class="btn-primary full-width" id="loginBtn">
                    <span>Sign In</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <!-- Top Bar -->
        <div class="admin-topbar">
            <div class="admin-topbar-left">
                <a href="index.html" class="admin-logo-link">
                    <img src="nexq-logo.png" alt="NEXQ">
                </a>
                <h1>Blog Admin</h1>
            </div>
            <div class="admin-topbar-right">
                <span class="admin-user" id="adminUserEmail"></span>
                <a href="blog.html" class="btn-view-blog" target="_blank">View Blog</a>
                <button class="btn-logout" id="logoutBtn">Logout</button>
            </div>
        </div>

        <div class="admin-main">
            <!-- Dashboard View -->
            <div id="dashboardView">
                <div class="stats-row">
                    <div class="stat-card">
                        <div class="stat-number" id="statTotal">0</div>
                        <div class="stat-label">Total Posts</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number stat-published" id="statPublished">0</div>
                        <div class="stat-label">Published</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number stat-drafts" id="statDrafts">0</div>
                        <div class="stat-label">Drafts</div>
                    </div>
                </div>

                <div class="dashboard-header">
                    <h2>All Posts</h2>
                    <button class="btn-new-post" id="newPostBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14M5 12h14"></path>
                        </svg>
                        <span>New Post</span>
                    </button>
                </div>

                <div class="posts-table-container">
                    <table class="posts-table">
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="postsTableBody">
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Editor View -->
            <div class="editor-view" id="editorView">
                <div class="editor-header">
                    <button class="btn-back" id="backToDashboard">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="m15 18-6-6 6-6"></path>
                        </svg>
                        <span id="editorTitle">New Post</span>
                    </button>
                    <div class="editor-actions">
                        <button class="btn-save" id="savePostBtn">Save Post</button>
                    </div>
                </div>

                <div class="editor-layout">
                    <!-- Main Editor -->
                    <div class="editor-main">
                        <input type="text" class="editor-field title-field" id="postTitleInput"
                            placeholder="Post Title">
                        <div class="slug-row">
                            <span class="slug-prefix">/blog/</span>
                            <input type="text" class="editor-field slug-input" id="postSlugInput"
                                placeholder="post-url-slug">
                        </div>
                        <textarea class="editor-field excerpt-field" id="excerptInput"
                            placeholder="Post excerpt — a brief summary shown on the blog listing..." rows="2"></textarea>
                        <div class="quill-wrapper">
                            <div id="quillEditor"></div>
                        </div>
                    </div>

                    <!-- Sidebar -->
                    <div class="editor-sidebar">
                        <!-- Cover Image -->
                        <div class="sidebar-card">
                            <h3>Cover Image</h3>
                            <div class="cover-upload-zone" id="coverUploadZone">
                                <img id="coverPreview" style="display: none;" alt="Cover preview">
                                <button type="button" class="btn-remove-cover" id="removeCoverBtn"
                                    style="display: none;" aria-label="Remove cover image">&times;</button>
                                <div id="uploadText">
                                    <div class="upload-icon">📷</div>
                                    <p class="upload-hint">Drop image or click to upload</p>
                                </div>
                                <input type="file" id="coverImageInput" accept="image/*" style="display: none;">
                            </div>
                            <div class="upload-progress" id="uploadProgress" style="display: none;">
                                <div class="upload-progress-bar" id="uploadProgressBar"></div>
                            </div>
                        </div>

                        <!-- Category -->
                        <div class="sidebar-card">
                            <h3>Category</h3>
                            <select class="sidebar-select" id="categorySelect">
                                <option value="">Select category</option>
                                <option value="EV News">EV News</option>
                                <option value="Charging Tips">Charging Tips</option>
                                <option value="Technology">Technology</option>
                                <option value="Industry">Industry</option>
                                <option value="Company Updates">Company Updates</option>
                                <option value="Guides">Guides</option>
                            </select>
                        </div>

                        <!-- Tags -->
                        <div class="sidebar-card">
                            <h3>Tags</h3>
                            <div class="tags-input-wrapper" id="tagsContainer">
                                <input type="text" class="tags-input" id="tagsInputField"
                                    placeholder="Type and press Enter">
                            </div>
                        </div>

                        <!-- Status -->
                        <div class="sidebar-card">
                            <h3>Publish</h3>
                            <div class="status-toggle">
                                <span class="status-label" id="statusLabel">Draft</span>
                                <label class="toggle-switch">
                                    <input type="checkbox" id="statusToggle">
                                    <span class="toggle-slider"></span>
                                </label>
                            </div>
                        </div>

                        <!-- SEO -->
                        <div class="sidebar-card">
                            <h3>SEO</h3>
                            <input type="text" class="seo-field" id="seoTitleInput"
                                placeholder="SEO Title (60 chars max)" maxlength="70">
                            <div class="char-count" id="seoTitleCount">0/60</div>
                            <textarea class="seo-field" id="seoDescInput"
                                placeholder="Meta Description (160 chars max)" maxlength="200"></textarea>
                            <div class="char-count" id="seoDescCount">0/160</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <!-- Quill Rich Text Editor -->
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>

</html>
