<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextCharge — Redirecting...</title>
    <script>
        (function() {
            var path = window.location.pathname;
            // Match /blog/slug or /network/... or /resources/...
            var blogMatch = path.match(/\/blog\/(.+)$/);
            if (blogMatch && blogMatch[1]) {
                var slug = decodeURIComponent(blogMatch[1]).replace(/^\/+/, '');
                window.location.replace('/blog.html?post=' + encodeURIComponent(slug));
            } else {
                window.location.replace('/index.html');
            }
        })();
    </script>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 50px; color: #64748B;">Redirecting to NextCharge...</p>
</body>
</html>
