<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — NextCharge | EV Charging Insights & Updates</title>
    <meta name="description"
        content="Stay updated with the latest news, tips, and insights about EV charging in India from NextCharge.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="q-app-icon.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="blog.css">

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-EC1BYN8B5K"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-EC1BYN8B5K');
    </script>
</head>

<body>
    <div class="reading-progress" id="readingProgress"></div>

    <main class="main-wrapper">
        <nav class="navbar">
            <div class="logo">
                <a href="index.html" class="logo-link">
                    <img src="nexq-logo.png" alt="NEXQ" class="nav-logo">
                    <span class="logo-subtitle">NextCharge</span>
                </a>
            </div>

            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <div class="nav-menu-wrapper" id="navMenuWrapper">
                <ul class="nav-links">
                    <li><a href="index.html#feedback">Feedback</a></li>
                    <li><a href="index.html#app">App</a></li>
                    <li><a href="blog.html" class="active-link">Blog</a></li>
                    <li><a href="index.html#partners">Partners</a></li>
                </ul>

                <div class="nav-contact-info">
                    <a href="mailto:contact@nextcharge.in">contact@nextcharge.in</a>
                    <span class="separator">|</span>
                    <a href="tel:+918208746187">+91 8208746187</a>
                    <span class="separator">|</span>
                    <a href="tel:+917507902116">+91 7507902116</a>
                </div>
            </div>
        </nav>

        <!-- Blog Listing View -->
        <div id="blogListingView">
            <section class="blog-hero">
                <div class="blog-hero-glow"></div>
                <h1 class="blog-hero-title">NextCharge Blog</h1>
                <p class="blog-hero-subtitle">Insights, updates, and stories from India's smartest EV charging
                    network.</p>

                <div class="blog-search-bar">
                    <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.3-4.3"></path>
                    </svg>
                    <input type="text" id="blogSearchInput" placeholder="Search articles..."
                        aria-label="Search blog posts">
                </div>

                <div class="category-tabs" id="categoryTabs">
                    <button class="category-tab active">All Posts</button>
                </div>
            </section>

            <div id="blogLoading" class="blog-loading">
                <div class="loading-spinner"></div>
            </div>

            <div class="blog-grid" id="blogGrid"></div>
        </div>

        <!-- Individual Post View -->
        <div id="postView" style="display: none;">
            <div class="post-hero" id="postHeroImage"></div>

            <div class="post-header">
                <button class="post-back-btn" onclick="window.location.hash='';">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6"></path>
                    </svg>
                    Back to Blog
                </button>

                <span class="post-category-badge" id="postCategory"></span>
                <h1 class="post-title" id="postTitle"></h1>

                <div class="post-meta">
                    <span class="post-meta-item">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="18" height="18" x="3" y="4" rx="2" ry="2"></rect>
                            <line x1="16" x2="16" y1="2" y2="6"></line>
                            <line x1="8" x2="8" y1="2" y2="6"></line>
                            <line x1="3" x2="21" y1="10" y2="10"></line>
                        </svg>
                        <span id="postDate"></span>
                    </span>
                    <span class="post-meta-item">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"></circle>
                            <polyline points="12 6 12 12 16 14"></polyline>
                        </svg>
                        <span id="postReadingTime"></span>
                    </span>
                    <span class="post-meta-item">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span id="postAuthor"></span>
                    </span>
                </div>
            </div>

            <div class="post-content" id="postBody"></div>

            <div class="post-content">
                <div class="post-tags" id="postTags"></div>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-contact">
                <a href="mailto:contact@nextcharge.in">contact@nextcharge.in</a>
                <a href="tel:+918208746187">+91 8208746187</a>
                <a href="tel:+917507902116">+91 7507902116</a>
            </div>
            <p>&copy; 2026 NextCharge. Made with <span class="highlight">❤︎⁠</span> in India.</p>
        </footer>
    </main>

    <!-- Firebase SDK (only App + Firestore for public blog) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="blog.js"></script>
</body>

</html>
